<!DOCTYPE  html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Aust</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0b'/%3E%3Ctext x='16' y='23' font-family='Arial Black,sans-serif' font-size='20' font-weight='900' fill='%23c8f04a' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --bg2: #111113;
      --bg3: #18181c;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #f0ede8;
      --text-muted: #6b6b72;
      --text-mid: #9a9aa3;
      --accent: #c8f04a;
      --red: #ff5c5c;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      padding: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    /* 403 screen */
    #forbidden {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    #forbidden .code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      color: var(--red);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }

    #forbidden h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    #forbidden p {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* loading screen */
    #loading {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* admin content */
    #admin-content { display: none; }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,11,0.9);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-user {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border-hover);
    }

    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0b;
      border: 1px solid var(--accent);
    }

    .btn-primary:hover { background: transparent; color: var(--accent); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid rgba(255,92,92,0.3);
    }

    .btn-danger:hover { background: rgba(255,92,92,0.1); }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 3rem;
      position: relative;
      z-index: 1;
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
    }

    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .panel-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .panel-body { padding: 2rem; }

    /* users table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 0.82rem;
    }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      color: var(--text-muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-mid);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); }

    .badge {
      display: inline-flex;
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      font-size: 0.68rem;
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
    }

    .badge-admin {
      background: rgba(200,240,74,0.1);
      color: var(--accent);
      border: 1px solid rgba(200,240,74,0.2);
    }

    .badge-user {
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* create user form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input, select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.65rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    select option { background: var(--bg3); }

    .msg {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      display: none;
    }

    .msg-success { background: rgba(200,240,74,0.08); border: 1px solid rgba(200,240,74,0.2); color: var(--accent); }
    .msg-error   { background: rgba(255,92,92,0.08);  border: 1px solid rgba(255,92,92,0.2);  color: var(--red); }

    .back-link {
      display: inline-flex;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">Verifying access...</div>

  <!-- 403 Forbidden -->
  <div id="forbidden">
    <div class="code">403</div>
    <h2>Access Denied.</h2>
    <p>You don't have permission to view this page.</p>
    <a href="/" class="btn btn-ghost">← Back to home</a>
  </div>

  <!-- Admin Content -->
  <div id="admin-content">
    <nav>
      <a href="/" class="nav-logo">thatonedudeaust.com / admin</a>
      <div class="nav-right">
        <span class="nav-user" id="nav-user"></span>
        <button class="btn btn-ghost" onclick="handleLogout()">Logout</button>
      </div>
    </nav>

    <main>
      <div style="animation: fadeUp 0.5s ease forwards">
        <h1 class="page-title">Admin Panel</h1>
        <p class="page-subtitle">Manage users and site settings.</p>

        <!-- Create User -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">Create New User</div>
          </div>
          <div class="panel-body">
            <div class="form-grid">
              <div class="field">
                <label>Email</label>
                <input type="email" id="new-email" placeholder="user@email.com" />
              </div>
              <div class="field">
                <label>Password</label>
                <input type="password" id="new-password" placeholder="Strong password" />
              </div>
            </div>
            <button class="btn btn-primary" onclick="createUser()">Create user →</button>
            <div class="msg msg-success" id="create-success"></div>
            <div class="msg msg-error" id="create-error"></div>
          </div>
        </div>

        <!-- Users List -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">All Users</div>
            <button class="btn btn-ghost" onclick="loadUsers()" style="font-size:0.72rem;padding:0.4rem 0.9rem">↻ Refresh</button>
          </div>
          <div class="panel-body" style="padding:0">
            <table>
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Username</th>
                  <th>Role</th>
                  <th>Created</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="users-table">
                <tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <a href="/" class="back-link">← Back to site</a>
      </div>
    </main>
  </div>

  <script>
    const SUPABASE_URL = 'https://rwsythvgrelvkldszdac.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_H1x2cBYCi86dKVynWe96oA_zUQKw1x3';
    const ADMIN_USER_ID = '18e1d5fe-be18-4012-8bb8-3c780f4a8eba';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();

      document.getElementById('loading').style.display = 'none';

      if (!session || session.user.id !== ADMIN_USER_ID) {
        document.getElementById('forbidden').style.display = 'flex';
        return;
      }

      document.getElementById('admin-content').style.display = 'block';
      document.getElementById('nav-user').textContent = session.user.email;
      loadUsers();
    }

    async function loadUsers() {
      const tbody = document.getElementById('users-table');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td></tr>';

      const { data: profiles, error } = await supabase.from('profiles').select('*');

      if (error || !profiles.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No users found.</td></tr>';
        return;
      }

      tbody.innerHTML = profiles.map(p => `
        <tr>
          <td style="color:var(--text)">—</td>
          <td style="color:var(--text)">${p.username}</td>
          <td><span class="badge ${p.is_admin ? 'badge-admin' : 'badge-user'}">${p.is_admin ? 'admin' : 'user'}</span></td>
          <td>—</td>
          <td></td>
        </tr>
      `).join('');
    }

    async function createUser() {
      const email = document.getElementById('new-email').value.trim();
      const password = document.getElementById('new-password').value;
      const successEl = document.getElementById('create-success');
      const errorEl = document.getElementById('create-error');

      successEl.style.display = 'none';
      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      // Use Supabase Admin API via edge function isn't available on static sites,
      // so we use signUp with auto-confirm disabled
      const { data, error } = await supabase.auth.signUp({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        return;
      }

      // Insert profile
      if (data.user) {
        await supabase.from('profiles').insert({
          id: data.user.id,
          username: email.split('@')[0],
          is_admin: false
        });
      }

      successEl.textContent = `User ${email} created successfully!`;
      successEl.style.display = 'block';
      document.getElementById('new-email').value = '';
      document.getElementById('new-password').value = '';
      loadUsers();
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      window.location.href = '/';
    }

    init();
  </script>

</body>
</html>
