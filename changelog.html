<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — Aust</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0b'/%3E%3Ctext x='16' y='23' font-family='Arial Black,sans-serif' font-size='20' font-weight='900' fill='%23c8f04a' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --bg2: #111113;
      --bg3: #18181c;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #f0ede8;
      --text-muted: #6b6b72;
      --text-mid: #9a9aa3;
      --accent: #c8f04a;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,11,0.85);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .nav-back {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--accent); }

    main {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 5rem 3rem;
    }

    .page-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .page-desc {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 4rem;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.3s;
    }

    /* TIMELINE */
    .timeline {
      position: relative;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    .entry {
      position: relative;
      padding: 0 0 3rem 2.5rem;
    }

    .entry:last-child { padding-bottom: 0; }

    .entry::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 8px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px var(--accent);
    }

    .entry-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }

    .entry-version {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent);
      background: rgba(200,240,74,0.08);
      border: 1px solid rgba(200,240,74,0.15);
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }

    .entry-date {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .entry-desc {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-mid);
      line-height: 1.8;
    }

    .empty-state {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 3rem 0 3rem 2.5rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      main { padding: 3rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">thatonedudeaust.com</a>
    <a href="/" class="nav-back">← Back to home</a>
  </nav>

  <main>
    <p class="page-eyebrow">Site history</p>
    <h1>Changelog</h1>
    <p class="page-desc">A running log of updates, fixes, and new features added to this site.</p>

    <div class="timeline" id="timeline">
      <div class="empty-state">Loading...</div>
    </div>
  </main>

  <script>
    var SUPABASE_URL = 'https://rwsythvgrelvkldszdac.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_H1x2cBYCi86dKVynWe96oA_zUQKw1x3';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadChangelog() {
      var { data, error } = await sb.from('changelog').select('*').order('created_at', { ascending: false });
      var timeline = document.getElementById('timeline');

      if (error || !data || data.length === 0) {
        timeline.innerHTML = '<div class="empty-state">No entries yet.</div>';
        return;
      }

      timeline.innerHTML = data.map(entry => `
        <div class="entry">
          <div class="entry-header">
            <span class="entry-version">${entry.version}</span>
            <span class="entry-date">${new Date(entry.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
          </div>
          <div class="entry-desc">${entry.description}</div>
        </div>
      `).join('');
    }

    loadChangelog();
  </script>

</body>
</html>
